<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Apple</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: white;
  overflow: hidden;
}

model-viewer {
  width: 100vw;
  height: 100vh;
  background: white;
}
</style>

</head>
<body>

<model-viewer
  src="apple.glb"
  camera-controls
  interaction-prompt="none"
  touch-action="none"
  min-camera-orbit="auto 0deg auto"
  max-camera-orbit="auto 180deg auto">
</model-viewer>

</body>
</html>
